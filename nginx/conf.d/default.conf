# nginx/conf.d/default.conf

# Блок для HTTP (порт 80)
server {
    listen 80;
    server_name katrinshop.duckdns.org www.katrinshop.duckdns.org;

    # 1. Специальный location для проверки Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 2. Все остальные запросы принудительно перенаправляем на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


server {
    listen 443 ssl;
    server_name katrinshop.duckdns.org www.katrinshop.duckdns.org;

    # Пути к сертификатам (которые создаст Certbot)
    ssl_certificate /etc/letsencrypt/live/katrinshop.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/katrinshop.duckdns.org/privkey.pem;

    # Современные настройки SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Включаем Gzip (как мы настраивали ранее)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- ВАШИ СТАРЫЕ ПРАВИЛА МАРШРУТИЗАЦИИ ---

    location /api/ {
        proxy_pass http://backend:3000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_cookie_domain backend $host;
        proxy_cookie_path / /;
        proxy_set_header Cookie $http_cookie;  
    }
    
    location /images/ {
        root /;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
    
    location /static/ {
        proxy_pass http://frontend:80/static/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}