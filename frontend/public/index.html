<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Катрин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#800020',
                        secondary: '#FFF5F5',
                        'text-main': '#4B5563', // Текст (gray-600)
                        'text-dark': '#1F2937', // Заголовки (gray-800)
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '4px',
                        DEFAULT: '8px',
                        'md': '12px',
                        'lg': '16px',
                        'xl': '20px',
                        '2xl': '24px',
                        '3xl': '32px',
                        'full': '9999px',
                        'button': '8px'
                    },
                    screens: {
                        '2xl': '1600px', // Делаем самый большой breakpoint еще шире
                    },
                    fontFamily: {
                        'playfair': ['Playfair Display', 'serif'],
                        'poppins': ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :where([class^="ri-"])::before {
            content: "\f3c2";
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }

        html {
            font-size: 16px; /* Убедимся, что базовый размер установлен */
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Poppins', sans-serif;
            color: #4B5563; /* Это наш 'text-main' */
            font-weight: 300; /* font-light - тонкое начертание по умолчанию */
            line-height: 2.3; /* leading-relaxed - бОльший межстрочный интервал */
            -webkit-font-smoothing: antialiased; /* Делает шрифты тоньше и четче на Mac */
            -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            color: #1F2937; /* Это наш 'text-dark' */
            font-weight: 700; /* Жирное начертание для заголовков */
            line-height: 1.2; /* Более плотный интервал для крупных текстов */
        }
        p {
            margin-bottom: 1rem;
            line-height: 1.7; /* Отступ после абзацев, как в prose */
        }
        strong, b {
            font-weight: 600; /* Полужирный, не слишком толстый */
            color: #374151; /* Чуть темнее основного текста */
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.js"></script>
</body>

</html>
